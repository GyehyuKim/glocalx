<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>ReadingGo — 독서가 게임이 된다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* =========================================================
   ReadingGo — React 진입점 CSS
   디자인 토큰 + 유틸리티 클래스 + 애니메이션
   ========================================================= */

/* ── 폰트 ────────────────────────────────────────────────── */
@font-face {
  font-family: 'Moneygraphy Rounded';
  src: url('fonts/Moneygraphy-Rounded.otf') format('opentype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Moneygraphy Pixel';
  src: url('fonts/Moneygraphy-Pixel.otf') format('opentype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}

/* ── 디자인 토큰 ─────────────────────────────────────────── */
:root {
  /* 페이퍼 톤 */
  --paper:        #FAF6F0;
  --paper-2:      #F4EFE6;
  --card:         #FFFFFF;
  --card-soft:    #FFF9F0;

  /* 잉크 */
  --ink:          #2A2D33;
  --ink-2:        #5A5F69;
  --ink-3:        #9097A0;
  --ink-4:        #C7CCD3;
  --line:         #ECE6DA;
  --line-2:       #F2EDE2;

  /* 브랜드 (참새의 민트) */
  --brand:        #3FD17F;
  --brand-2:      #2EB867;
  --brand-3:      #1F8E4D;
  --brand-soft:   #DFF6EA;
  --brand-tint:   #F1FBF5;
  --brand-shadow: #1F8E4D;

  /* 스트릭 불꽃 */
  --fire:         #FF8A3D;
  --fire-2:       #FFA970;
  --fire-soft:    #FFE6D4;
  --fire-shadow:  #D8651F;

  /* XP 골드 */
  --gold:         #FFC233;
  --gold-2:       #FFD66B;
  --gold-soft:    #FFF1C7;
  --gold-shadow:  #C8901C;

  /* 보조 */
  --blue:         #5AB5F0;
  --blue-soft:    #E1F1FB;
  --rose:         #F08A9A;
  --rose-soft:    #FCE4E9;
  --violet:       #B690F0;
  --violet-soft:  #ECE2FB;

  /* 그림자 */
  --shadow-1: 0 1px 2px rgba(20,20,30,.04), 0 6px 18px rgba(20,20,30,.06);
  --shadow-2: 0 2px 6px rgba(20,20,30,.06), 0 12px 28px rgba(20,20,30,.08);
  --shadow-mint: 0 8px 22px rgba(63,209,127,.25);

  /* 라운드 */
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

/* ── 기본 리셋 ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Moneygraphy Rounded', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.2px;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }
#root { height: 100%; }

/* ── 픽셀 액센트 ─────────────────────────────────────────── */
.rg-pixel {
  font-family: 'Moneygraphy Pixel', 'Moneygraphy Rounded', monospace;
  letter-spacing: 0.5px;
}

/* ── 모바일 셸 ───────────────────────────────────────────── */
.rg-stage {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background:
    radial-gradient(900px 480px at 50% -200px, #DDF6E7 0%, transparent 60%),
    var(--paper);
}
.rg-app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--paper);
  position: relative;
  display: flex;
  flex-direction: column;
}
@media (min-width: 800px) {
  .rg-stage { padding: 32px 20px 64px; }
  .rg-app {
    border-radius: 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.05);
    min-height: calc(100vh - 64px);
    max-height: 920px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
}

/* ── 레이아웃 유틸 ───────────────────────────────────────── */
.rg-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  overflow: hidden;
}
.rg-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.rg-tab-header {
  padding: 16px 16px 0;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.4px;
  color: var(--ink);
}
.rg-bottom-bar {
  position: sticky;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(250,246,240,.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  padding: 8px 16px 24px;
  display: flex;
  gap: 8px;
}

/* ── 카드 ─────────────────────────────────────────────────── */
.rg-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
}

/* ── 인풋 ─────────────────────────────────────────────────── */
.rg-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  background: var(--card-soft);
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
  transition: border-color .15s ease;
}
.rg-input:focus { border-color: var(--brand); background: #fff; }

/* ── 아이콘 버튼 ─────────────────────────────────────────── */
.rg-btn-icon {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  border-radius: 50%;
  color: var(--ink-2);
  transition: background .12s ease;
}
.rg-btn-icon:hover { background: var(--paper-2); }
.rg-btn-icon:active { background: var(--line); }

/* ── 배지 ─────────────────────────────────────────────────── */
.rg-badge-green {
  display: inline-flex; align-items: center;
  padding: 3px 8px;
  background: var(--brand-tint);
  color: var(--brand-3);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2px;
}

/* ── 이중 버튼 ───────────────────────────────────────────── */
.btn-duo {
  flex: 1;
  padding: 13px 8px;
  border: none;
  border-radius: var(--r-md);
  font-weight: 900; font-size: 15px;
  transition: transform .08s ease, border-bottom-width .08s ease;
}
.btn-duo:active { transform: translateY(2px); }
.btn-duo.btn-green {
  background: var(--brand);
  color: #fff;
  border-bottom: 4px solid var(--brand-shadow);
}
.btn-duo.btn-white {
  background: var(--card);
  color: var(--ink);
  border: 1.5px solid var(--line);
  border-bottom: 4px solid var(--ink-4);
}
.btn-duo.btn-yellow {
  background: var(--gold);
  color: #7a4f00;
  border-bottom: 4px solid var(--gold-shadow);
}
.btn-duo.btn-off {
  background: var(--paper-2);
  color: var(--ink-3);
  border-bottom: 4px solid var(--line);
}

/* ── 경로 노드 ───────────────────────────────────────────── */
.node-current, .node-done, .node-ghost {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 13px; font-weight: 900;
}
.node-done    { background: var(--brand); color: #fff; }
.node-current { background: var(--gold); color: #fff; box-shadow: 0 0 0 3px var(--gold-soft); }
.node-ghost   { background: var(--paper-2); color: var(--ink-4); }

/* ── 텍스트 유틸 ─────────────────────────────────────────── */
.line-clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tooltip {
  position: relative;
}

/* ── 애니메이션 ──────────────────────────────────────────── */
.fade-in  { animation: rgFadeIn  .22s ease both; }
.slide-up { animation: rgSlideUp .3s cubic-bezier(.2,.8,.2,1) both; }
.pop-in   { animation: rgPopIn   .35s cubic-bezier(.2,.8,.2,1.15) both; }

@keyframes rgFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes rgSlideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes rgPopIn {
  0%   { opacity: 0; transform: scale(.88); }
  60%  { opacity: 1; transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* 참새 바운스 */
.sparrow-bounce {
  animation: sparrowBounce 1.8s ease-in-out infinite;
}
@keyframes sparrowBounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

/* ── 로딩 스피너 (앱 부트 전) ───────────────────────────── */
.rg-boot {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 700;
}
.rg-boot-icon {
  font-size: 40px;
  animation: sparrowBounce 1.2s ease-in-out infinite;
}
</style>
</head>
<body>

<!-- React 앱 마운트 포인트 -->
<div id="root">
  <div class="rg-boot">
    <span class="rg-boot-icon">🐦</span>
    <span>ReadingGo 로딩 중...</span>
  </div>
</div>

<!-- React 18 CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<!-- Babel standalone (JSX 변환) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
/* ── 순차 Babel 로더 ──────────────────────────────────────
   각 파일을 fetch → Babel.transform → eval 순서로 직렬 실행.
   window.X = X 패턴 덕분에 다음 파일에서 이전 심볼 참조 가능.
   ─────────────────────────────────────────────────────── */
const _RG_V = '42';

async function loadBabel(src) {
  const res = await fetch(src + '?v=' + _RG_V);
  if (!res.ok) throw new Error(src + ' 로드 실패 (HTTP ' + res.status + ')');
  const code = await res.text();
  const { code: js } = Babel.transform(code, {
    presets: ['react'],
    filename: src,
  });
  (0, eval)(js); // indirect eval → global scope
}

(async () => {
  try {
    await loadBabel('js/data.js');
    await loadBabel('js/components.js');
    await loadBabel('js/onboarding.js');
    await loadBabel('js/nest.js');
    await loadBabel('js/village.js');
    await loadBabel('js/social.js');
    await loadBabel('js/library.js');
    await loadBabel('js/app.js');
    // app.js가 ReactDOM.createRoot('#root').render(<App/>) 실행
  } catch (err) {
    console.error('[ReadingGo] 로드 실패:', err);
    document.getElementById('root').innerHTML =
      '<div class="rg-boot" style="gap:8px">' +
        '<span style="font-size:36px">🐦</span>' +
        '<p style="margin:0;font-weight:900;color:#2A2D33">앱을 불러오지 못했어요</p>' +
        '<p style="margin:0;font-size:12px;color:#9097A0">' + err.message + '</p>' +
        '<button onclick="location.reload()" style="margin-top:8px;padding:10px 20px;border:none;border-radius:12px;background:#3FD17F;color:#fff;font-weight:900;font-size:14px">다시 시도</button>' +
      '</div>';
  }
})();
</script>

</body>
</html>
