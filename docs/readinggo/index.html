<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>리딩고 — 하루 한 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { nunito: ['Nunito', 'sans-serif'] },
    colors: { duo: {
      green:'#58CC02', dgreen:'#46A302', xgreen:'#89E219',
      yellow:'#FFC800', blue:'#1CB0F6', dblue:'#1899D6',
      red:'#FF4B4B', orange:'#FF9600', purple:'#CE82FF',
      navy:'#1F1F1F', gray:'#AFAFAF', light:'#F7F7F7', border:'#E5E5E5',
    }}
  }}
}
</script>
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*{font-family:'Nunito',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#e5e7eb;display:flex;justify-content:center;min-height:100vh;margin:0}
#root{width:100%;max-width:390px;min-height:100vh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:0}

/* ── Duolingo 3-D buttons ─────────────────────────────────────── */
.btn-duo{border-radius:16px;border:none;padding:14px 24px;font-weight:800;font-size:15px;
  cursor:pointer;transition:transform .1s,box-shadow .1s;font-family:'Nunito',sans-serif;
  letter-spacing:.3px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-duo:active{transform:translateY(3px);box-shadow:none!important}
.btn-green {background:#58CC02;color:#fff;box-shadow:0 4px 0 #46A302}
.btn-white {background:#fff;color:#58CC02;box-shadow:0 4px 0 #E5E5E5;border:2px solid #E5E5E5!important}
.btn-yellow{background:#FFC800;color:#fff;box-shadow:0 4px 0 #E6A800}
.btn-off   {background:#E5E5E5!important;color:#AFAFAF!important;box-shadow:none!important;cursor:not-allowed!important}

/* ── Path nodes ───────────────────────────────────────────────── */
.node-done   {background:#58CC02;border:4px solid #46A302;box-shadow:0 4px 0 #46A302}
.node-current{background:#fff;border:4px solid #58CC02;
  box-shadow:0 0 0 8px rgba(88,204,2,.15),0 4px 0 #46A302;
  animation:nodePulse 2s ease-in-out infinite}
.node-ghost  {background:#E5E5E5;border:4px solid #d0d0d0;opacity:.2}

/* ── Animations ───────────────────────────────────────────────── */
@keyframes bounce   {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes slideUp  {from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn    {from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes confetti {0%{transform:translateY(-20px) rotate(0deg);opacity:1}
                    100%{transform:translateY(260px) rotate(720deg);opacity:0}}
@keyframes ping     {0%{transform:scale(1);opacity:.8}100%{transform:scale(2.5);opacity:0}}
@keyframes fadeIn   {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 8px rgba(88,204,2,.15),0 4px 0 #46A302}
                    50%{box-shadow:0 0 0 14px rgba(88,204,2,.06),0 4px 0 #46A302}}

.sparrow-bounce{animation:bounce 1.4s ease-in-out infinite}
.slide-up{animation:slideUp .3s ease}
.pop-in  {animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.fade-in {animation:fadeIn .3s ease}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tooltip{display:none}
.group:hover .tooltip{display:block}

/* ── ReadingGo layout tokens (Tailwind migration 준비) ─────── */
.rg-screen{display:flex;flex-direction:column;height:100%}
.rg-tab-header{padding:14px 16px;border-bottom:2px solid #E5E5E5;background:#fff}
.rg-scroll{flex:1;overflow-y:auto;background:#F7F7F7;padding:16px}
.rg-card{background:#fff;border-radius:20px;border:2px solid #E5E5E5;padding:16px}
.rg-badge-green{font-size:11px;font-weight:800;color:#58CC02;background:#F0FDF4;
  border:1.5px solid #D7F0BF;border-radius:8px;padding:2px 8px}
.rg-input{width:100%;border:2px solid #E5E5E5;border-radius:14px;padding:12px 16px;
  font-size:15px;font-weight:600;outline:none;font-family:'Nunito',sans-serif;
  transition:border-color .2s}
.rg-bottom-bar{padding:12px 16px 24px;border-top:2px solid #E5E5E5}
.rg-btn-icon{background:none;border:none;cursor:pointer;padding:4px}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;
    flex-direction:column;gap:16px;color:#58CC02">
    <svg width="60" height="60" viewBox="0 0 120 120" fill="none">
      <ellipse cx="60" cy="72" rx="32" ry="28" fill="#C49A4A"/>
      <circle cx="72" cy="44" r="22" fill="#C49A4A"/>
      <ellipse cx="84" cy="50" rx="10" ry="8" fill="#F5EDD0"/>
      <circle cx="76" cy="40" r="5" fill="#1A0A00"/>
      <circle cx="77" cy="39" r="1.5" fill="white"/>
      <path d="M88 46 L98 44 L88 50 Z" fill="#8B6234"/>
    </svg>
    <span style="font-weight:900;font-size:18px">로딩 중...</span>
  </div>
</div>

<script>
// 순차적 Babel 로더 — 파일당 eval 보장
async function loadBabel(src) {
  const res = await fetch(src + '?v=2');
  if (!res.ok) throw new Error(src + ' 로드 실패: ' + res.status);
  const code = await res.text();
  const { code: js } = Babel.transform(code, { presets: ['react'] });
  // indirect eval → global scope, var 선언은 window 속성이 됨
  // const/let 은 window.X = X 패턴으로 별도 노출
  (0, eval)(js);
}

(async () => {
  try {
    const files = [
      'js/data.js',
      'js/components.js',
      'js/onboarding.js',
      'js/nest.js',
      'js/village.js',
      'js/social.js',
      'js/library.js',
      'js/app.js',
    ];
    for (const f of files) await loadBabel(f);
  } catch (e) {
    console.error(e);
    document.getElementById('root').innerHTML =
      `<div style="padding:24px;color:#FF4B4B;font-weight:700">
        로드 실패: ${e.message}<br>
        <small style="color:#AFAFAF">로컬에서 열 때는 Live Server 등 HTTP 서버를 사용하세요.</small>
      </div>`;
  }
})();
</script>
</body>
</html>
