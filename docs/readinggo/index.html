<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>리딩고 (Reading GO)</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { nunito: ['Nunito', 'sans-serif'] },
      colors: {
        duo: {
          green:  '#58CC02',
          dgreen: '#46A302',
          xgreen: '#89E219',
          yellow: '#FFC800',
          blue:   '#1CB0F6',
          dblue:  '#1899D6',
          red:    '#FF4B4B',
          orange: '#FF9600',
          purple: '#CE82FF',
          navy:   '#1F1F1F',
          gray:   '#AFAFAF',
          light:  '#F7F7F7',
          border: '#E5E5E5',
        }
      }
    }
  }
}
</script>
<style>
* { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
body { background:#e5e7eb; display:flex; justify-content:center; min-height:100vh; margin:0; }
#root { width:100%; max-width:390px; min-height:100vh; background:#fff; }
::-webkit-scrollbar { width:0; }

/* Duolingo 3D button */
.btn-duo {
  position:relative;
  border-radius:16px;
  border:none;
  padding:14px 24px;
  font-weight:800;
  font-size:15px;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:transform 0.1s, box-shadow 0.1s;
  text-transform:uppercase;
}
.btn-duo:active { transform:translateY(3px); box-shadow:none !important; }
.btn-green  { background:#58CC02; color:#fff; box-shadow:0 4px 0 #46A302; }
.btn-white  { background:#fff; color:#58CC02; box-shadow:0 4px 0 #E5E5E5; border:2px solid #E5E5E5; }
.btn-yellow { background:#FFC800; color:#fff; box-shadow:0 4px 0 #E6A800; }

/* Node styles */
.node-done    { background:#58CC02; border:4px solid #46A302; box-shadow:0 4px 0 #46A302; }
.node-current { background:#fff;    border:4px solid #58CC02; box-shadow:0 0 0 6px rgba(88,204,2,0.2), 0 4px 0 #46A302; }
.node-ghost   { background:#E5E5E5; border:4px solid #d0d0d0; }

@keyframes bounce    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes slideUp   { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes popIn     { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes confetti  { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(160px) rotate(720deg);opacity:0} }
@keyframes ping      { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(2.2);opacity:0} }

.sparrow-bounce { animation:bounce 1.4s ease-in-out infinite; }
.line-clamp-2   { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.tooltip        { display:none; }
.group:hover .tooltip { display:block; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const LS = {
  get:(k,d)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
};

// ── Data ──────────────────────────────────────────────────────────────────────
const INIT_USER = {
  name:"리리", level:3, xp:240, xpMax:500, streak:7,
  currentBook:{ id:1, title:"어린 왕자", author:"생텍쥐페리", totalPages:160, currentPage:72 },
  sessions:[
    {id:1,page:10,sentence:"\"별을 바라보렴. 내 별이 어디 있는지 알 수 없을 테니까.\"",date:"5/7"},
    {id:2,page:22,sentence:"\"길들인다는 건, 관계를 맺는다는 뜻이야.\"",date:"5/8"},
    {id:3,page:35,sentence:"\"사막이 아름다운 건 어딘가에 우물을 숨기고 있기 때문이야.\"",date:"5/9"},
    {id:4,page:48,sentence:"\"사람들은 급행열차를 타지만 무엇을 찾는지 몰라.\"",date:"5/10"},
    {id:5,page:57,sentence:"\"중요한 건 눈에 보이지 않아. 마음으로 보아야 해.\"",date:"5/11"},
    {id:6,page:63,sentence:"\"어른들은 숫자를 좋아해.\"",date:"5/12"},
    {id:7,page:72,sentence:"\"나는 책임이 있어. 장미에 대해.\"",date:"5/13"},
  ],
};
const INIT_FRIENDS = [
  {id:1,name:"계휴", stage:4,isLit:true, sentence:"\"별은 아름답다, 모래들이 아름답듯이.\""},
  {id:2,name:"승원", stage:2,isLit:false,sentence:"\"사막이 아름다운 건 어딘가에 우물을 숨기고 있기 때문이야.\""},
  {id:3,name:"지수", stage:5,isLit:true, sentence:"\"중요한 건 눈에 보이지 않아.\""},
  {id:4,name:"민준", stage:1,isLit:false,sentence:""},
];
const INIT_FEED = [
  {id:1,user:"계휴",book:"어린 왕자",sentence:"\"별은 아름답다, 모래들이 아름답듯이.\"",time:"2시간 전",claps:3},
  {id:2,user:"지수",book:"어린 왕자",sentence:"\"중요한 건 눈에 보이지 않아. 마음으로 보아야 해.\"",time:"5시간 전",claps:7},
  {id:3,user:"리리",book:"어린 왕자",sentence:"\"길들인다는 건, 관계를 맺는다는 뜻이야.\"",time:"어제",claps:5},
];
const INIT_BOOKS = [
  {id:1,title:"어린 왕자",    author:"생텍쥐페리",    cover:"📖",totalPages:160},
  {id:2,title:"데미안",       author:"헤르만 헤세",   cover:"📗",totalPages:228},
  {id:3,title:"노르웨이의 숲",author:"무라카미 하루키",cover:"📘",totalPages:308},
];
const NEST_STAGES = [
  {max:20, name:"기초 공사",   emoji:"🪵",color:"#AFAFAF",bg:"#f3f4f6"},
  {max:50, name:"포근한 둥지", emoji:"🪹",color:"#F59E0B",bg:"#FEF3C7"},
  {max:80, name:"튼튼한 나무집",emoji:"🏠",color:"#58CC02",bg:"#F0FDF4"},
  {max:99, name:"고급 저택",   emoji:"🏡",color:"#1CB0F6",bg:"#EFF6FF"},
  {max:100,name:"리딩 팰리스", emoji:"🏰",color:"#CE82FF",bg:"#FAF5FF"},
];
const getNestStage = pct => NEST_STAGES.find(s=>pct<=s.max)||NEST_STAGES[4];

// ── Sparrow SVG (참새 스타일) ─────────────────────────────────────────────────
const Sparrow = ({ size=48, cls="" }) => (
  <svg width={size} height={size} viewBox="0 0 120 120" fill="none" className={cls}>
    {/* Body */}
    <ellipse cx="60" cy="72" rx="32" ry="28" fill="#C49A4A"/>
    {/* Wing */}
    <ellipse cx="55" cy="76" rx="24" ry="16" fill="#8B6234" transform="rotate(-10 55 76)"/>
    <ellipse cx="56" cy="74" rx="20" ry="12" fill="#A07840" transform="rotate(-10 56 74)"/>
    {/* Belly */}
    <ellipse cx="66" cy="80" rx="16" ry="14" fill="#E8D5A3"/>
    {/* Head */}
    <circle cx="72" cy="44" r="22" fill="#C49A4A"/>
    {/* Crown */}
    <ellipse cx="72" cy="28" rx="14" ry="10" fill="#6B3F1A"/>
    <ellipse cx="68" cy="30" rx="10" ry="7" fill="#8B5E2A"/>
    {/* White cheek */}
    <ellipse cx="84" cy="50" rx="10" ry="8" fill="#F5EDD0"/>
    {/* Black ear patch */}
    <ellipse cx="80" cy="52" rx="5" ry="4" fill="#2A1A0A" transform="rotate(15 80 52)"/>
    {/* Eye */}
    <circle cx="76" cy="40" r="5" fill="#1A0A00"/>
    <circle cx="77" cy="39" r="1.5" fill="white"/>
    {/* Beak */}
    <path d="M88 46 L98 44 L88 50 Z" fill="#8B6234"/>
    <path d="M88 48 L96 46 L88 50 Z" fill="#6B4A1A"/>
    {/* Legs */}
    <line x1="55" y1="96" x2="50" y2="110" stroke="#8B6234" strokeWidth="3" strokeLinecap="round"/>
    <line x1="65" y1="96" x2="70" y2="110" stroke="#8B6234" strokeWidth="3" strokeLinecap="round"/>
    <line x1="50" y1="110" x2="44" y2="114" stroke="#8B6234" strokeWidth="2.5" strokeLinecap="round"/>
    <line x1="50" y1="110" x2="52" y2="115" stroke="#8B6234" strokeWidth="2.5" strokeLinecap="round"/>
    <line x1="70" y1="110" x2="64" y2="114" stroke="#8B6234" strokeWidth="2.5" strokeLinecap="round"/>
    <line x1="70" y1="110" x2="72" y2="115" stroke="#8B6234" strokeWidth="2.5" strokeLinecap="round"/>
  </svg>
);

// ── Icons ─────────────────────────────────────────────────────────────────────
const Icon = ({d,s=22,c="",fill="none",sw=2}) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={c}>{d}</svg>
);
const HomeIcon   = ({s,c})=><Icon s={s} c={c} d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>}/>;
const MapIcon    = ({s,c})=><Icon s={s} c={c} d={<><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></>}/>;
const UsersIcon  = ({s,c})=><Icon s={s} c={c} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
const BookIcon   = ({s,c})=><Icon s={s} c={c} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>}/>;
const SearchIcon = ({s,c})=><Icon s={s} c={c} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const XIcon      = ({s=22,c=""})=><Icon s={s} c={c} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;

// ── NestIcon (village) ────────────────────────────────────────────────────────
const NestIcon = ({stage,size=40,isLit=false}) => {
  const icons=["🪵","🪹","🏠","🏡","🏰"];
  return (
    <div className="relative inline-flex items-center justify-center" style={{width:size,height:size}}>
      <span style={{fontSize:size*0.68,filter:isLit?"none":"grayscale(70%)",opacity:isLit?1:0.55}}>{icons[Math.min(stage-1,4)]}</span>
      {isLit&&<span className="absolute top-0 right-0 flex h-3 w-3">
        <span className="absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75" style={{animation:"ping 1.2s ease-out infinite"}}/>
        <span className="relative inline-flex rounded-full h-3 w-3 bg-yellow-400"/>
      </span>}
    </div>
  );
};

// ── Header ────────────────────────────────────────────────────────────────────
const AppHeader = ({streak,xp,xpMax,level}) => (
  <div className="flex items-center justify-between px-4 py-3 bg-white border-b-2 border-duo-border">
    {/* Logo */}
    <div className="flex items-center gap-1.5">
      <Sparrow size={30}/>
      <span style={{fontSize:17,fontWeight:900,color:"#1F1F1F",letterSpacing:"-0.5px"}}>reading<span style={{color:"#58CC02"}}>Go</span></span>
    </div>
    {/* Stats */}
    <div className="flex items-center gap-3">
      <div className="flex items-center gap-1">
        <span style={{fontSize:20}}>🔥</span>
        <span style={{fontWeight:800,fontSize:15,color:"#FF9600"}}>{streak}</span>
      </div>
      <div className="flex items-center gap-1">
        <span style={{fontSize:18}}>⚡</span>
        <span style={{fontWeight:800,fontSize:15,color:"#1CB0F6"}}>{xp}</span>
      </div>
      <div className="flex items-center justify-center w-8 h-8 rounded-full" style={{background:"#CE82FF"}}>
        <span style={{fontWeight:800,fontSize:11,color:"#fff"}}>Lv{level}</span>
      </div>
    </div>
  </div>
);

// ── Nest evolution banner ─────────────────────────────────────────────────────
const NestBanner = ({book}) => {
  if(!book) return null;
  const pct = Math.round((book.currentPage/book.totalPages)*100);
  const st  = getNestStage(pct);
  return (
    <div className="mx-4 mt-4 rounded-2xl overflow-hidden" style={{background:st.bg, border:`2px solid ${st.color}22`}}>
      <div className="flex items-center gap-3 p-4">
        <div className="flex items-center justify-center w-14 h-14 rounded-2xl bg-white shadow-sm text-3xl">{st.emoji}</div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <span style={{fontWeight:800,fontSize:13,color:st.color}}>{st.name}</span>
            <span style={{fontWeight:700,fontSize:12,color:"#AFAFAF"}}>{pct}%</span>
          </div>
          {/* Progress bar */}
          <div className="w-full rounded-full h-3 overflow-hidden" style={{background:"#E5E5E5"}}>
            <div className="h-3 rounded-full transition-all duration-700" style={{width:`${pct}%`,background:st.color}}/>
          </div>
          <p style={{fontSize:11,color:"#AFAFAF",marginTop:4}} className="truncate">{book.title} · {book.currentPage}/{book.totalPages}p</p>
        </div>
      </div>
    </div>
  );
};

// ── Dynamic Path ──────────────────────────────────────────────────────────────
const ZIGZAG = ["22%","50%","72%","50%"];
const getX = i => ZIGZAG[i%4];

const DynamicPath = ({sessions, onRecordClick, todayDone}) => {
  const endRef = useRef(null);
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth",block:"center"}); },[sessions.length]);

  const N = sessions.length;
  const totalRows = N + 2;

  return (
    <div className="relative" style={{minHeight:`${totalRows*96+60}px`, paddingBottom:40}}>
      {/* SVG dashed connector */}
      <svg className="absolute inset-0 w-full pointer-events-none" style={{height:`${totalRows*96+60}px`}}>
        {Array.from({length:N},(_,i)=>{
          const x1=parseFloat(getX(i))+6, y1=i*96+52;
          const x2=parseFloat(getX(i+1))+6, y2=(i+1)*96+52;
          return <line key={i} x1={`${x1}%`} y1={y1} x2={`${x2}%`} y2={y2} stroke="#D7F0BF" strokeWidth="5" strokeDasharray="10 6" strokeLinecap="round"/>;
        })}
        {N>0 && (
          <line x1={`${parseFloat(getX(N-1))+6}%`} y1={(N-1)*96+52} x2={`${parseFloat(getX(N))+6}%`} y2={N*96+52} stroke="#D7F0BF" strokeWidth="5" strokeDasharray="10 6" strokeLinecap="round"/>
        )}
      </svg>

      {/* Completed nodes */}
      {sessions.map((s,i)=>(
        <div key={s.id} className="absolute group" style={{left:getX(i),top:`${i*96+12}px`,transform:"translateX(-50%)"}}>
          {/* Tooltip */}
          <div className="tooltip absolute bottom-full mb-2 left-1/2 z-20 pointer-events-none" style={{transform:"translateX(-50%)",width:180}}>
            <div className="bg-duo-navy text-white rounded-xl px-3 py-2 text-xs shadow-lg">
              <p style={{fontWeight:700,marginBottom:2}}>{s.date} · p.{s.page}</p>
              <p style={{opacity:0.85,lineHeight:1.4}} className="line-clamp-2">{s.sentence}</p>
            </div>
          </div>
          {/* Circle */}
          <div className="node-done flex items-center justify-center rounded-full cursor-default select-none"
            style={{width:56,height:56}}>
            <span style={{fontSize:22,color:"#fff"}}>✓</span>
          </div>
          <p style={{fontSize:10,color:"#AFAFAF",textAlign:"center",marginTop:4,fontWeight:700}}>{s.date}</p>
        </div>
      ))}

      {/* Current node */}
      <div ref={endRef} className="absolute" style={{left:getX(N),top:`${N*96+4}px`,transform:"translateX(-50%)"}}>
        <div className="flex flex-col items-center">
          <div className="sparrow-bounce" style={{marginBottom:4}}>
            <Sparrow size={50}/>
          </div>
          {!todayDone ? (
            <button onClick={onRecordClick} className="node-current flex items-center justify-center rounded-full transition-transform active:scale-90"
              style={{width:56,height:56,cursor:"pointer"}}>
              <span style={{fontSize:24}}>📝</span>
            </button>
          ) : (
            <div className="node-done flex items-center justify-center rounded-full" style={{width:56,height:56}}>
              <span style={{fontSize:22}}>🔥</span>
            </div>
          )}
          <div className="mt-2 px-3 py-1 rounded-full" style={{background:"#58CC02",boxShadow:"0 3px 0 #46A302"}}>
            <span style={{fontSize:11,fontWeight:800,color:"#fff"}}>{todayDone?"오늘 완료! 🎉":"오늘 기록하기"}</span>
          </div>
        </div>
      </div>

      {/* Ghost next */}
      <div className="absolute" style={{left:getX(N+1),top:`${(N+1)*96+12}px`,transform:"translateX(-50%)",opacity:0.2}}>
        <div className="node-ghost flex items-center justify-center rounded-full" style={{width:56,height:56}}>
          <span style={{fontSize:22,color:"#AFAFAF"}}>?</span>
        </div>
      </div>
    </div>
  );
};

// ── NestView ──────────────────────────────────────────────────────────────────
const NestView = ({user, onRecordClick, todayDone}) => (
  <div className="flex flex-col h-full">
    <AppHeader streak={user.streak} xp={user.xp} xpMax={user.xpMax} level={user.level}/>
    <div className="flex-1 overflow-y-auto" style={{background:"#F7F7F7"}}>
      <NestBanner book={user.currentBook}/>
      {/* Path label */}
      <div className="flex items-center gap-2 px-5 mt-5 mb-3">
        <div className="flex-1 h-px" style={{background:"#E5E5E5"}}/>
        <span style={{fontSize:12,fontWeight:700,color:"#AFAFAF",letterSpacing:1}}>나의 독서 로드맵</span>
        <div className="flex-1 h-px" style={{background:"#E5E5E5"}}/>
      </div>
      <DynamicPath sessions={user.sessions} onRecordClick={onRecordClick} todayDone={todayDone}/>
    </div>
  </div>
);

// ── Mission Modal ─────────────────────────────────────────────────────────────
const MissionModal = ({book, onClose, onSubmit}) => {
  const [page, setPage]         = useState("");
  const [sentence, setSentence] = useState("");
  const valid = page && parseInt(page)>0 && parseInt(page)<=book.totalPages && sentence.trim().length>0;

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{background:"rgba(0,0,0,0.55)"}}>
      <div className="bg-white w-full max-w-sm rounded-t-3xl pb-8" style={{animation:"slideUp 0.3s ease"}}>
        {/* Handle */}
        <div className="flex justify-center pt-3 pb-1">
          <div className="w-10 h-1 rounded-full" style={{background:"#E5E5E5"}}/>
        </div>
        <div className="px-6 pt-2">
          <div className="flex items-center justify-between mb-5">
            <span style={{fontWeight:900,fontSize:18,color:"#1F1F1F"}}>오늘의 독서 기록</span>
            <button onClick={onClose}><XIcon c="text-gray-400"/></button>
          </div>
          {/* Book chip */}
          <div className="flex items-center gap-3 rounded-2xl p-3 mb-5" style={{background:"#F0FDF4",border:"2px solid #D7F0BF"}}>
            <span style={{fontSize:26}}>📖</span>
            <div>
              <p style={{fontWeight:800,fontSize:14,color:"#1F1F1F"}}>{book.title}</p>
              <p style={{fontSize:11,color:"#AFAFAF"}}>{book.author} · 전 {book.totalPages}p</p>
            </div>
          </div>
          {/* Page input */}
          <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F",marginBottom:6}}>오늘 읽은 마지막 페이지</p>
          <input type="number" placeholder={`1 ~ ${book.totalPages}`} value={page}
            onChange={e=>setPage(e.target.value)}
            style={{width:"100%",border:"2px solid #E5E5E5",borderRadius:14,padding:"12px 16px",fontSize:16,fontWeight:700,outline:"none",marginBottom:16,fontFamily:"Nunito"}}
            onFocus={e=>e.target.style.borderColor="#58CC02"}
            onBlur={e=>e.target.style.borderColor="#E5E5E5"}/>
          {/* Sentence input */}
          <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F",marginBottom:6}}>기억하고 싶은 한 문장</p>
          <textarea placeholder="오늘 읽은 내용 중 마음에 남는 문장을 적어주세요" value={sentence}
            onChange={e=>setSentence(e.target.value)} rows={3} maxLength={500}
            style={{width:"100%",border:"2px solid #E5E5E5",borderRadius:14,padding:"12px 16px",fontSize:14,fontWeight:600,outline:"none",resize:"none",fontFamily:"Nunito",marginBottom:4}}
            onFocus={e=>e.target.style.borderColor="#58CC02"}
            onBlur={e=>e.target.style.borderColor="#E5E5E5"}/>
          <p style={{fontSize:11,color:"#AFAFAF",textAlign:"right",marginBottom:20}}>{sentence.length}/500</p>
          <button onClick={()=>valid&&onSubmit(parseInt(page),sentence)}
            className={valid?"btn-duo btn-green":"btn-duo"}
            style={!valid?{background:"#E5E5E5",color:"#AFAFAF",cursor:"not-allowed",borderRadius:16,width:"100%",padding:"14px 24px",fontWeight:800,fontSize:15,border:"none"}:{width:"100%"}}
            disabled={!valid}>
            기록 완료 🔥
          </button>
        </div>
      </div>
    </div>
  );
};

// ── Reward Modal ──────────────────────────────────────────────────────────────
const RewardModal = ({xpGained, sessionNum, onClose}) => (
  <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:"rgba(0,0,0,0.65)"}}>
    <div className="bg-white rounded-3xl p-8 mx-5 text-center shadow-2xl" style={{animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)",maxWidth:320,width:"100%"}}>
      <div className="flex justify-center mb-4"><Sparrow size={72} cls="sparrow-bounce"/></div>
      <p style={{fontWeight:900,fontSize:22,color:"#1F1F1F",marginBottom:4}}>훌륭해요!</p>
      <p style={{fontSize:13,color:"#AFAFAF",marginBottom:20}}>로드맵 {sessionNum}번째 노드 획득!</p>
      <div className="flex justify-center gap-3 mb-6">
        {[["🔥","스트릭","#FFF3E0","#FF9600"],["⚡",`+${xpGained} XP`,"#E0F4FF","#1CB0F6"],["⬆️","전진!","#F0FDF4","#58CC02"]].map(([e,l,bg,cl])=>(
          <div key={l} className="rounded-2xl px-3 py-3 text-center" style={{background:bg,flex:1}}>
            <div style={{fontSize:22}}>{e}</div>
            <div style={{fontSize:11,fontWeight:800,color:cl,marginTop:4}}>{l}</div>
          </div>
        ))}
      </div>
      <button onClick={onClose} className="btn-duo btn-green" style={{width:"100%"}}>계속하기</button>
    </div>
  </div>
);

// ── Completion Ceremony ───────────────────────────────────────────────────────
const CompletionCeremony = ({book, onClose}) => {
  const colors=["#58CC02","#FFC800","#1CB0F6","#FF4B4B","#CE82FF"];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:"rgba(0,0,0,0.75)"}}>
      <div className="bg-white rounded-3xl p-8 mx-5 text-center shadow-2xl relative overflow-hidden" style={{animation:"popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)",maxWidth:320,width:"100%"}}>
        {Array.from({length:18},(_,i)=>(
          <div key={i} className="absolute" style={{left:`${5+i*5.5}%`,top:-12,width:9,height:9,borderRadius:3,background:colors[i%5],animation:`confetti ${1+Math.random()}s ${Math.random()*0.5}s ease-in forwards`}}/>
        ))}
        <div style={{fontSize:72,marginBottom:8}}>🏰</div>
        <p style={{fontWeight:900,fontSize:24,color:"#1F1F1F",marginBottom:4}}>완독 대성공!</p>
        <p style={{fontSize:13,color:"#AFAFAF",marginBottom:4}}>{book.title} 완독!</p>
        <p style={{fontWeight:800,fontSize:15,color:"#CE82FF",marginBottom:20}}>리딩 팰리스 달성 🎉</p>
        <div className="flex gap-2 justify-center mb-6">
          {["🔥 스트릭","⭐ +100 XP","🏅 완독 배지"].map(t=>(
            <div key={t} className="rounded-xl px-2 py-2" style={{background:"#F0FDF4",flex:1}}>
              <span style={{fontSize:11,fontWeight:800,color:"#58CC02"}}>{t}</span>
            </div>
          ))}
        </div>
        <button onClick={onClose} className="btn-duo btn-green" style={{width:"100%"}}>계속 읽기 🐦</button>
      </div>
    </div>
  );
};

// ── VillageView ───────────────────────────────────────────────────────────────
const VillageView = ({friends}) => {
  const [sent,setSent] = useState({});
  const doSend = id => { setSent(s=>({...s,[id]:true})); setTimeout(()=>setSent(s=>({...s,[id]:false})),3000); };
  return (
    <div className="flex flex-col h-full">
      <div className="px-4 py-3 border-b-2" style={{background:"#fff",borderColor:"#E5E5E5"}}>
        <div className="flex items-center gap-2">
          <span style={{fontSize:22}}>🏘️</span>
          <span style={{fontWeight:900,fontSize:17,color:"#1F1F1F"}}>리딩 빌리지</span>
        </div>
        <p style={{fontSize:12,color:"#AFAFAF",fontWeight:600,marginTop:2}}>💡 불빛 ON = 오늘 읽음 · 🪱 모이 = 독려 알림</p>
      </div>
      <div className="flex-1 overflow-y-auto p-4" style={{background:"#F7F7F7"}}>
        <div className="grid grid-cols-2 gap-3 mb-4">
          {friends.map(f=>(
            <div key={f.id} className="bg-white rounded-2xl p-3 shadow-sm" style={{border:`2px solid ${f.isLit?"#D7F0BF":"#E5E5E5"}`}}>
              <div className="flex items-start justify-between mb-2">
                <NestIcon stage={f.stage} size={46} isLit={f.isLit}/>
                {f.isLit&&<span className="rounded-full px-2 py-0.5" style={{fontSize:10,fontWeight:800,background:"#F0FDF4",color:"#58CC02"}}>읽는 중</span>}
              </div>
              <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F",marginBottom:4}}>{f.name}</p>
              {f.sentence&&<p style={{fontSize:11,color:"#AFAFAF",lineHeight:1.4,marginBottom:8}} className="line-clamp-2">{f.sentence}</p>}
              {!f.isLit&&(
                <button onClick={()=>doSend(f.id)} disabled={sent[f.id]}
                  className="btn-duo" style={{width:"100%",padding:"8px 12px",fontSize:11,borderRadius:10,background:sent[f.id]?"#E5E5E5":"#58CC02",color:sent[f.id]?"#AFAFAF":"#fff",boxShadow:sent[f.id]?"none":"0 3px 0 #46A302",cursor:sent[f.id]?"not-allowed":"pointer"}}>
                  {sent[f.id]?"전송됨 ✓":"🪱 모이 보내기"}
                </button>
              )}
            </div>
          ))}
        </div>
        <div className="bg-white rounded-2xl p-4" style={{border:"2px solid #E5E5E5"}}>
          <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F",marginBottom:8}}>📋 마을 게시판</p>
          <p style={{fontSize:12,color:"#AFAFAF",textAlign:"center",padding:"16px 0"}}>첫 글을 남겨보세요! ✍️</p>
        </div>
      </div>
    </div>
  );
};

// ── SocialView ────────────────────────────────────────────────────────────────
const SocialView = ({feed, onClap}) => {
  const [clapped,setClapped] = useState({});
  const leagues=[{rank:1,name:"계휴",xp:420,badge:"🥇"},{rank:2,name:"지수",xp:380,badge:"🥈"},{rank:3,name:"리리",xp:240,badge:"🥉"},{rank:4,name:"승원",xp:180,badge:""}];
  const doClap = id => { if(clapped[id])return; setClapped(s=>({...s,[id]:true})); onClap(id); };
  return (
    <div className="flex flex-col h-full">
      <div className="px-4 py-3 border-b-2 bg-white" style={{borderColor:"#E5E5E5"}}>
        <div className="flex items-center gap-2">
          <span style={{fontSize:22}}>👥</span>
          <span style={{fontWeight:900,fontSize:17,color:"#1F1F1F"}}>소셜</span>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto" style={{background:"#F7F7F7"}}>
        {/* League */}
        <div className="mx-4 mt-4 bg-white rounded-2xl p-4 mb-4" style={{border:"2px solid #E5E5E5"}}>
          <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F",marginBottom:12}}>🏆 이번 주 리그</p>
          {leagues.map(l=>(
            <div key={l.rank} className="flex items-center gap-3 mb-2 rounded-xl px-2 py-2" style={{background:l.name==="리리"?"#F0FDF4":"transparent"}}>
              <span style={{fontSize:16,width:24,textAlign:"center"}}>{l.badge||l.rank}</span>
              <span style={{flex:1,fontWeight:700,fontSize:13,color:"#1F1F1F"}}>{l.name}</span>
              <span style={{fontWeight:800,fontSize:12,color:"#1CB0F6"}}>{l.xp} XP</span>
            </div>
          ))}
        </div>
        {/* Feed */}
        <div className="px-4 pb-4 space-y-3">
          {feed.map(item=>(
            <div key={item.id} className="bg-white rounded-2xl p-4" style={{border:"2px solid #E5E5E5"}}>
              <div className="flex items-center gap-2 mb-3">
                <div className="w-9 h-9 rounded-full flex items-center justify-center overflow-hidden" style={{background:"#F0FDF4"}}>
                  <Sparrow size={30}/>
                </div>
                <div>
                  <p style={{fontWeight:800,fontSize:13,color:"#1F1F1F"}}>{item.user}</p>
                  <p style={{fontSize:11,color:"#AFAFAF"}}>{item.book} · {item.time}</p>
                </div>
              </div>
              <p style={{fontSize:13,color:"#4a4a4a",fontStyle:"italic",lineHeight:1.6,marginBottom:12}}>{item.sentence}</p>
              <button onClick={()=>doClap(item.id)}
                className="flex items-center gap-1 rounded-full px-3 py-1.5 transition-all"
                style={{background:clapped[item.id]?"#FFF3E0":"#F7F7F7",border:`2px solid ${clapped[item.id]?"#FFC800":"#E5E5E5"}`,fontSize:12,fontWeight:800,color:clapped[item.id]?"#FF9600":"#AFAFAF"}}>
                👏 {item.claps+(clapped[item.id]?1:0)}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── LibraryView ───────────────────────────────────────────────────────────────
const LibraryView = ({books, currentBook, onRegister}) => {
  const [query,setQuery] = useState("");
  const filtered = query ? books.filter(b=>b.title.includes(query)||b.author.includes(query)) : books;
  return (
    <div className="flex flex-col h-full">
      <div className="px-4 py-3 border-b-2 bg-white" style={{borderColor:"#E5E5E5"}}>
        <div className="flex items-center gap-2">
          <span style={{fontSize:22}}>📚</span>
          <span style={{fontWeight:900,fontSize:17,color:"#1F1F1F"}}>내 서재</span>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-4" style={{background:"#F7F7F7"}}>
        {currentBook&&(
          <div className="bg-white rounded-2xl p-4 mb-4" style={{border:"2px solid #D7F0BF"}}>
            <p style={{fontSize:11,fontWeight:800,color:"#58CC02",marginBottom:8}}>📖 현재 읽는 중</p>
            <div className="flex items-center gap-3">
              <span style={{fontSize:32}}>📖</span>
              <div>
                <p style={{fontWeight:800,fontSize:14,color:"#1F1F1F"}}>{currentBook.title}</p>
                <p style={{fontSize:11,color:"#AFAFAF"}}>{currentBook.author} · {currentBook.currentPage}/{currentBook.totalPages}p</p>
              </div>
            </div>
          </div>
        )}
        <div className="relative mb-4">
          <SearchIcon s={16} c="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
          <input placeholder="책 제목, 저자 검색..." value={query} onChange={e=>setQuery(e.target.value)}
            style={{width:"100%",border:"2px solid #E5E5E5",borderRadius:14,padding:"11px 14px 11px 36px",fontSize:14,fontWeight:600,outline:"none",fontFamily:"Nunito",background:"#fff"}}
            onFocus={e=>e.target.style.borderColor="#58CC02"} onBlur={e=>e.target.style.borderColor="#E5E5E5"}/>
        </div>
        <div className="space-y-2">
          {filtered.map(book=>(
            <div key={book.id} className="bg-white rounded-2xl p-4 flex items-center gap-3" style={{border:"2px solid #E5E5E5"}}>
              <span style={{fontSize:32}}>{book.cover}</span>
              <div style={{flex:1}}>
                <p style={{fontWeight:800,fontSize:14,color:"#1F1F1F"}}>{book.title}</p>
                <p style={{fontSize:11,color:"#AFAFAF"}}>{book.author} · {book.totalPages}p</p>
              </div>
              <button onClick={()=>onRegister(book)} className="btn-duo"
                style={{padding:"8px 14px",fontSize:12,borderRadius:12,background:currentBook?.id===book.id?"#E5E5E5":"#58CC02",color:currentBook?.id===book.id?"#AFAFAF":"#fff",boxShadow:currentBook?.id===book.id?"none":"0 3px 0 #46A302",cursor:currentBook?.id===book.id?"default":"pointer"}}>
                {currentBook?.id===book.id?"읽는 중":"등록"}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Bottom Nav ────────────────────────────────────────────────────────────────
const BottomNav = ({active, onChange}) => {
  const tabs=[
    {id:"nest",   label:"둥지",   Icon:HomeIcon},
    {id:"village",label:"마을",   Icon:MapIcon},
    {id:"social", label:"소셜",   Icon:UsersIcon},
    {id:"library",label:"내서재", Icon:BookIcon},
  ];
  return (
    <div className="flex bg-white border-t-2" style={{borderColor:"#E5E5E5",paddingBottom:"env(safe-area-inset-bottom)"}}>
      {tabs.map(({id,label,Icon})=>{
        const on=active===id;
        return (
          <button key={id} onClick={()=>onChange(id)} className="flex-1 flex flex-col items-center gap-0.5 py-2.5 transition-all">
            <Icon s={22} c={on?"":"text-gray-300"} style={on?{color:"#58CC02"}:{}}/>
            <span style={{fontSize:11,fontWeight:800,color:on?"#58CC02":"#AFAFAF"}}>{label}</span>
          </button>
        );
      })}
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [tab,setTab]             = useState("nest");
  const [user,setUser]           = useState(()=>LS.get("rg_v3", INIT_USER));
  const [friends]                = useState(INIT_FRIENDS);
  const [feed,setFeed]           = useState(()=>LS.get("rg_feed3", INIT_FEED));
  const [books]                  = useState(INIT_BOOKS);
  const [showMission,setMission] = useState(false);
  const [showReward,setReward]   = useState(false);
  const [showCeremony,setCeremony] = useState(false);
  const [lastXP,setLastXP]       = useState(0);
  const [todayDone,setTodayDone] = useState(false);

  useEffect(()=>{ LS.set("rg_v3",user); },[user]);
  useEffect(()=>{ LS.set("rg_feed3",feed); },[feed]);

  const handleRecord = useCallback((page,sentence)=>{
    const xpGained = 30+Math.floor(Math.random()*20);
    const d = new Date();
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    const isComplete = page >= user.currentBook.totalPages;
    setUser(u=>({
      ...u,
      xp: Math.min(u.xp+xpGained, u.xpMax),
      streak: u.streak+1,
      sessions:[...u.sessions,{id:Date.now(),page,sentence,date:dateStr}],
      currentBook:{...u.currentBook, currentPage:Math.min(page,u.currentBook.totalPages)},
    }));
    setFeed(f=>[{id:Date.now(),user:user.name,book:user.currentBook.title,sentence,time:"방금",claps:0},...f]);
    setLastXP(xpGained);
    setTodayDone(true);
    setMission(false);
    if(isComplete){ setTimeout(()=>setCeremony(true),300); } else { setReward(true); }
  },[user]);

  return (
    <div className="flex flex-col h-screen bg-white overflow-hidden shadow-2xl">
      <div className="flex-1 overflow-hidden">
        {tab==="nest"    && <NestView user={user} onRecordClick={()=>setMission(true)} todayDone={todayDone}/>}
        {tab==="village" && <VillageView friends={friends}/>}
        {tab==="social"  && <SocialView feed={feed} onClap={id=>setFeed(f=>f.map(i=>i.id===id?{...i,claps:i.claps+1}:i))}/>}
        {tab==="library" && <LibraryView books={books} currentBook={user.currentBook} onRegister={book=>setUser(u=>({...u,currentBook:{...book,currentPage:0},sessions:[]}))}/>}
      </div>
      <BottomNav active={tab} onChange={setTab}/>
      {showMission&&user.currentBook&&<MissionModal book={user.currentBook} onClose={()=>setMission(false)} onSubmit={handleRecord}/>}
      {showReward&&<RewardModal xpGained={lastXP} sessionNum={user.sessions.length} onClose={()=>setReward(false)}/>}
      {showCeremony&&<CompletionCeremony book={user.currentBook} onClose={()=>setCeremony(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
